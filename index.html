
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .header { padding: 1.5rem 1.5rem 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .header h1 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .header p { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
  .phase-nav { display: flex; gap: 6px; padding: 1rem 1.5rem; flex-wrap: wrap; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .phase-btn { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; transition: all .15s; white-space: nowrap; }
  .phase-btn:hover { background: var(--color-background-tertiary); }
  .phase-btn.active { border-color: transparent; color: #fff; }
  .phase-btn.p1.active { background: #534AB7; }
  .phase-btn.p2.active { background: #0F6E56; }
  .phase-btn.p3.active { background: #993C1D; }
  .phase-btn.p4.active { background: #185FA5; }
  .phase-btn.p5.active { background: #854F0B; }
  .phase-btn.p6.active { background: #993556; }
  .content { padding: 1.25rem 1.5rem; }
  .phase-title { font-size: 13px; font-weight: 500; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .phase-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .steps-grid { display: grid; gap: 10px; }
  .step-card { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; cursor: pointer; transition: border-color .15s; }
  .step-card:hover { border-color: var(--color-border-secondary); }
  .step-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
  .step-num { font-size: 11px; font-weight: 500; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
  .step-actors { display: flex; gap: 4px; flex-shrink: 0; }
  .actor-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; border: 0.5px solid; }
  .actor-empresa { background: #E6F1FB; color: #0C447C; border-color: #85B7EB; }
  .actor-creditscore { background: #EAF3DE; color: #27500A; border-color: #97C459; }
  .actor-backoffice { background: #FAEEDA; color: #633806; border-color: #EF9F27; }
  .actor-contabilista { background: #FBEAF0; color: #72243E; border-color: #D4537E; }
  .actor-compliance { background: #EEEDFE; color: #3C3489; border-color: #7F77DD; }
  .actor-declarante { background: #FAECE7; color: #4A1B0C; border-color: #D85A30; }
  @media (prefers-color-scheme: dark) {
    .actor-empresa { background: #042C53; color: #B5D4F4; border-color: #185FA5; }
    .actor-creditscore { background: #173404; color: #C0DD97; border-color: #3B6D11; }
    .actor-backoffice { background: #412402; color: #FAC775; border-color: #BA7517; }
    .actor-contabilista { background: #4B1528; color: #F4C0D1; border-color: #993556; }
    .actor-compliance { background: #26215C; color: #CECBF6; border-color: #534AB7; }
    .actor-declarante { background: #4A1B0C; color: #F5C4B3; border-color: #993C1D; }
  }
  .step-detail { display: none; padding: 0 14px 12px 46px; border-top: 0.5px solid var(--color-border-tertiary); margin-top: 0; }
  .step-detail.open { display: block; }
  .step-detail ul { list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .step-detail li { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
  .step-detail li::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--color-border-secondary); flex-shrink: 0; margin-top: 5px; }
  .step-note { font-size: 11px; color: var(--color-text-tertiary); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--color-border-tertiary); }
  .chevron { font-size: 11px; color: var(--color-text-tertiary); transition: transform .2s; flex-shrink: 0; }
  .step-card.open .chevron { transform: rotate(180deg); }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; padding: 0 1.5rem 1rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .progress-bar { height: 3px; background: var(--color-border-tertiary); margin: 0 1.5rem 1rem; border-radius: 2px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }
</style>

<div class="header">
  <h1>Five Credit — Fluxo de tarefas</h1>
  <p>Processo completo de candidatura a financiamento empresarial</p>
</div>

<div class="phase-nav" id="phaseNav"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div> Empresa</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div> Creditscore</div>
  <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div> Backoffice</div>
  <div class="legend-item"><div class="legend-dot" style="background:#72243E"></div> Contabilista</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3C3489"></div> Compliance</div>
  <div class="legend-item"><div class="legend-dot" style="background:#993C1D"></div> Declarante</div>
</div>

<div class="content" id="stepsContent"></div>

<script>
const phases = [
  {
    id: 'p1', label: 'Registo', color: '#534AB7',
    steps: [
      { n: 1, title: 'Registo na plataforma', actors: ['empresa'], steps: ['Selecionar "Registe-se"', 'Nome e NIF do representante da empresa', 'Escolher password (5-20 car., maiúscula, minúscula, número e especial)', 'Aceitar Termos e Privacidade'], note: 'Sem ação de backoffice necessária.' },
      { n: 2, title: 'Validação do email', actors: ['empresa', 'creditscore'], steps: ['Inserir email do representante', 'Sistema envia código de validação (até 3 min — verificar SPAM)', 'Inserir código recebido e validar'], note: 'Sem ação de backoffice.' },
      { n: 3, title: 'Validação do telemóvel', actors: ['empresa', 'creditscore'], steps: ['Inserir número de telemóvel', 'Sistema envia SMS com código (até 3 min)', 'Inserir código e validar'], note: 'Email 2 e 3 para alteração de password.' },
    ]
  },
  {
    id: 'p2', label: 'Candidatura', color: '#0F6E56',
    steps: [
      { n: 4, title: 'Criação de candidatura', actors: ['empresa', 'creditscore'], steps: ['Escolher produto de financiamento', 'Escolher montante pretendido', 'Escolher finalidade(s) de financiamento', 'Validar e submeter'], note: '' },
      { n: 5, title: 'Requisitos da candidatura', actors: ['empresa', 'creditscore'], steps: ['Introduzir o código da CRC', 'Sistema verifica elegibilidade (até 3 min)', 'Requisitos: faturação ≥75k€, ≥3 anos de atividade, situação regularizada com AT, SS e Justiça'], note: 'Email 4 ou 5 com resultado de elegibilidade.' },
      { n: 6, title: 'Contabilista certificado — identificação', actors: ['empresa', 'creditscore'], steps: ['Nome do Contabilista Certificado', 'Número de telefone e email do CC', 'Sistema envia email ao CC com link seguro'], note: 'Email 6. Avisar o CC que vai receber email da plataforma.' },
    ]
  },
  {
    id: 'p3', label: 'Documentos', color: '#993C1D',
    steps: [
      { n: 7, title: 'CC — upload de informação SAFT', actors: ['contabilista', 'creditscore'], steps: ['CC recebe email e clica no 1.º link', 'Instalar Five Extractor (Apple ou Microsoft)', 'Abrir, extrair dados e guardar Excel no PC', 'Clicar no 2.º link → Enviar email com código', 'Upload dos ficheiros Excel via BROWSE'], note: 'Emails 7, 8 e 9. Vídeo: youtube.com/watch?v=05jWnMeT5-s' },
      { n: 8, title: 'Extensão Five Credit Doc Sync', actors: ['empresa', 'creditscore'], steps: ['Instalar extensão no Google Chrome', 'Pop-up: Adicionar extensão', 'Ir ao ícone puzzle → 3 pontos → Gerir extensão', 'Permitir acesso a URLs de arquivo', 'Fechar browser e validar extensão no site Five Credit'], note: 'Vídeo: youtube.com/watch?v=uxv3VsP1tnE' },
      { n: 9, title: 'Recolha automática — Banco de Portugal', actors: ['empresa', 'creditscore'], steps: ['Site Five Credit: Banco de Portugal', 'Atualizar extensão', 'Clicar em Recolher documentos', 'Autenticar no site do BDP', 'Extensão recolhe dados automaticamente'], note: '' },
      { n: 10, title: 'Recolha manual — Banco de Portugal', actors: ['empresa', 'creditscore'], steps: ['Aceder a Base de Dados de Contas', 'Aceitar condições de acesso à BCB', 'Autenticar e obter mapa', 'Repetir para Mapa de Responsabilidades e Restrição de Cheques'], note: 'Não alterar nome nem formato dos ficheiros.' },
      { n: 11, title: 'Recolha automática — Segurança Social', actors: ['empresa', 'creditscore'], steps: ['Site Five Credit: Segurança Social', 'Atualizar extensão', 'Recolher documentos', 'Login no site da SS', 'Extensão recolhe automaticamente'], note: '' },
      { n: 12, title: 'Recolha manual — Segurança Social', actors: ['empresa', 'creditscore'], steps: ['Aceder à Declaração de Não Dívida', 'Login no site da SS', 'Obter nova declaração', 'Browse → selecionar documento → Submeter'], note: '' },
      { n: 13, title: 'Recolha automática — Autoridade Tributária', actors: ['empresa', 'creditscore'], steps: ['Site Five Credit: Autoridade Tributária', 'Atualizar extensão', 'Recolher documentos', 'Login no site da AT'], note: '' },
      { n: 14, title: 'Recolha manual — Autoridade Tributária', actors: ['empresa', 'creditscore'], steps: ['Declaração de Não Dívida — aceder', 'Login no site da AT', 'Certidão de Dívida/Não Dívida → Confirmar', 'Renomear ficheiro de .action para .pdf', 'Browse → selecionar → Submeter'], note: 'Guardar com tipo "Todos os ficheiros".' },
      { n: 15, title: 'Verificação do processo do CC', actors: ['empresa', 'creditscore'], steps: ['Confirmar se o CC efetuou o upload do SAFT', 'Se não efetuou: reenviar email e aguardar', 'Se efetuou: avançar para próximo passo'], note: 'Emails 8 e 9.' },
    ]
  },
  {
    id: 'p4', label: 'Avaliação', color: '#185FA5',
    steps: [
      { n: 16, title: 'Submeter candidatura', actors: ['empresa'], steps: ['Confirmar todos os dados', 'Submeter candidatura', 'Pop-up: confirmar submissão', 'Aguardar email de avaliação'], note: '' },
      { n: 16.1, title: 'Backoffice — aceitar ou rejeitar', actors: ['backoffice'], steps: ['Análise financeira faz login', 'Selecionar empresa candidata', 'Dashboard: clicar no lápis', 'Informação conforme → Crédito (inicia simulação)', 'Informação não conforme → Rejeitar (email ao candidato)'], note: 'Emails 10 ou 11.' },
      { n: 17, title: 'Simulação de crédito', actors: ['empresa', 'creditscore'], steps: ['Clicar no link recebido por email', 'Login no site Five Credit', 'Aceder ao Simulador de Crédito', 'Efetuar, calcular e guardar simulação', 'Confirmar e submeter simulação', 'Aguardar aceitação'], note: 'Email 10. Vídeo: youtube.com/watch?v=L9PFJyZivO0' },
      { n: 17.1, title: 'Backoffice — aceitar/rejeitar simulação', actors: ['backoffice'], steps: ['Board (2 de 3): aceitar ou rejeitar simulação', 'Aceitação → inicia processo de RCBE'], note: 'Email 12.' },
    ]
  },
  {
    id: 'p5', label: 'KYC & RCBE', color: '#854F0B',
    steps: [
      { n: 18, title: 'RCBE — recolha do documento', actors: ['empresa', 'creditscore'], steps: ['Clicar no link recebido por email', 'Login no site Five Credit', 'Clicar em Recolher RCBE', 'Reencaminhar email para o Declarante', 'Aguardar confirmação de submissão'], note: 'Email 12. Importante: só o Declarante pode submeter.' },
      { n: 19, title: 'RCBE — Declarante', actors: ['declarante', 'creditscore'], steps: ['Clicar no link recebido por email', 'Preencher informação solicitada', 'Aguardar código de autenticação', 'Instalar extensão FIVE CREDIT RCBE Sync', 'Autenticar no site RCBE', 'Aguardar recolha automática → Concluir'], note: 'Emails 13, 14, 15 e 16.' },
      { n: 19.1, title: 'Backoffice — criar estrutura KYC & ESG', actors: ['backoffice', 'compliance'], steps: ['Compliance cria estrutura KYC com base em RCBE, CRC e SABI', 'Selecionar fontes → Concluir', 'Pop-up: dados de quem responde ao KYC', 'Confirmar e gerar processo KYC', 'Iniciar KYC → Submeter'], note: 'Email 17.' },
      { n: 20, title: 'KYC & ESG — preenchimento', actors: ['empresa'], steps: ['Clicar no link de preenchimento KYC & ESG', 'Preencher campos obrigatórios (incluindo avalistas)', 'Documentos necessários: certidões AT e SS, IRS, recibos de vencimento, evidência de património', 'Submeter KYC e aceitar RGPD'], note: 'Emails 17, 18 e 19.' },
      { n: 20.1, title: 'Backoffice — revisão KYC', actors: ['compliance', 'backoffice'], steps: ['Login em KYC.FiveCredit', 'Iniciar revisão', 'Confirmar ou rejeitar dados/documentação', 'Verificar PEPs e Medidas Restritivas (Dow Jones)', 'Consultar Base Geral, CIRE e Lista Pública de Execuções', 'CRC do Banco de Portugal'], note: 'Só finalizar KYC após validação dos avalistas.' },
      { n: 20.2, title: 'Procedimento avalistas (KYC)', actors: ['compliance'], steps: ['Estandardizar ficheiros: irs_NIF.pdf, imi_NIF.pdf', 'Enviar por email para análise financeira', 'Aguardar aprovação com rating A ou B', 'Arquivar email na pasta do avalista'], note: '' },
    ]
  },
  {
    id: 'p6', label: 'Formalização', color: '#993556',
    steps: [
      { n: 21, title: 'Informação contratual', actors: ['empresa', 'creditscore'], steps: ['Clicar no link recebido por email', 'Confirmar dados dos avalistas, representantes e conta bancária', 'Submeter e sair'], note: 'Email 20.' },
      { n: 21.1, title: 'Backoffice — formalização do contrato', actors: ['compliance', 'backoffice'], steps: ['Confirmar dados e guardar', 'Submeter → contrato gerado em PDF', 'Board (2 de 3): aceitar ou rejeitar contrato', 'Contrato fica disponível na plataforma'], note: 'Email 21.' },
      { n: 22, title: 'Download e upload do contrato', actors: ['empresa', 'compliance'], steps: ['Empresa recebe email de agendamento de assinatura', 'Comparecer com: documento de identificação, carimbo da empresa, ata de aprovação, procuração (se aplicável)', 'Compliance digitaliza documentação assinada', 'Empresa faz upload: Contrato + Autorização de Débito + Livrança (PDF)'], note: '' },
      { n: 22.1, title: 'Backoffice — aprovação final', actors: ['compliance', 'backoffice'], steps: ['Compliance verifica conformidade dos documentos', 'Aceder à candidatura → Aprovar → Confirmar', 'Candidatura passa ao estado "Completo"', 'Departamento Financeiro inicia transferência'], note: '' },
      { n: 23, title: 'Imposto de Selo', actors: ['backoffice'], steps: ['Apurar valor com base em colunas Stamp, Stamp on Loan e Stamp on Fees', 'Enviar para Contabilista Certificado (EY)', 'Confirmar internamente', 'Envio de guia até dia 20 do mês seguinte'], note: '' },
      { n: 24, title: 'Faturação', actors: ['backoffice'], steps: ['Faturas de contratos em curso: colunas Interest e Stamp', 'Faturas de novos contratos: Opening Fee, Stamp on Loan e Stamp on Fee', 'EY emite faturas e envia até dia 5 do mês seguinte', 'Suporte envia faturas via finance@fivecredit.pt'], note: '' },
      { n: 25, title: 'Débitos diretos', actors: ['backoffice'], steps: ['Marathon envia informação ao Bankinter (D-5)', 'Bankinter → Sibs', 'Plataforma envia email automático com info da 1.ª tentativa de débito', 'Contratos "Performing": comunicações de segundas tentativas não automatizadas'], note: '' },
    ]
  },
];

const actorClass = { empresa: 'actor-empresa', creditscore: 'actor-creditscore', backoffice: 'actor-backoffice', contabilista: 'actor-contabilista', compliance: 'actor-compliance', declarante: 'actor-declarante' };
const actorLabel = { empresa: 'Empresa', creditscore: 'Creditscore', backoffice: 'Backoffice', contabilista: 'Contabilista', compliance: 'Compliance', declarante: 'Declarante' };

let activePhase = 'p1';

function renderNav() {
  const nav = document.getElementById('phaseNav');
  nav.innerHTML = phases.map(p => `<button class="phase-btn ${p.id}${p.id===activePhase?' active':''}" onclick="setPhase('${p.id}')">${p.label}</button>`).join('');
}

function renderSteps() {
  const phase = phases.find(p => p.id === activePhase);
  const phaseIdx = phases.findIndex(p => p.id === activePhase);
  const pct = Math.round(((phaseIdx + 1) / phases.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressFill').style.background = phase.color;

  document.getElementById('stepsContent').innerHTML = `
    <div class="phase-title">
      <div class="phase-dot" style="background:${phase.color}"></div>
      <span style="color:${phase.color}">${phase.label}</span>
      <span style="color:var(--color-text-tertiary);font-weight:400">— ${phase.steps.length} passo${phase.steps.length>1?'s':''}</span>
    </div>
    <div class="steps-grid">
      ${phase.steps.map((s,i) => `
        <div class="step-card" id="card-${i}" onclick="toggleStep(${i})">
          <div class="step-header">
            <div class="step-num" style="background:${phase.color}22;color:${phase.color};font-weight:600">${String(Math.floor(s.n)).padStart(2,'0')}</div>
            <div class="step-title">${s.title}</div>
            <div class="step-actors">${s.actors.map(a=>`<span class="actor-badge ${actorClass[a]}">${actorLabel[a]}</span>`).join('')}</div>
            <span class="chevron">▾</span>
          </div>
          <div class="step-detail" id="detail-${i}">
            <ul>${s.steps.map(st=>`<li>${st}</li>`).join('')}</ul>
            ${s.note ? `<div class="step-note">${s.note}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function setPhase(id) {
  activePhase = id;
  renderNav();
  renderSteps();
}

function toggleStep(i) {
  const card = document.getElementById('card-'+i);
  const detail = document.getElementById('detail-'+i);
  card.classList.toggle('open');
  detail.classList.toggle('open');
}

renderNav();
renderSteps();
</script>
